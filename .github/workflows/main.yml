name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Setup Nodejs environment
        uses: actions/setup-node@v2.4.1
        with:
          node-version: 22.x
          
      # Instalar as dependências Yarn (no github)
      - name: Install Dependencies on GitHub
        run: yarn
        
      # Executar a build (no github)
      - name: Build App on GitHub
        run: yarn build
        
      # Copiar a pasta dist para dentro da Digital Ocean
      - name: Copy dist to Digital Ocean
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          source: ".,!node_modules"
          target: "~/automax-api"

      # Instalar as dependências no servidor da Digital Ocean
      - name: Install dependencias on Digital Ocean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/automax-api
            yarn
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart automax
